<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"><title>Categories — Admin</title></head>
<body>
<div class="d-flex" style="min-height:100vh;">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Categories</h2>
            <a th:href="@{/admin/categories/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Add category
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Slug</th>
                        <th>Products</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td class="text-muted small" th:text="${cat.id}"></td>
                        <td class="fw-medium" th:text="${cat.name}"></td>
                        <td><code th:text="${cat.slug}"></code></td>
                        <td th:text="${cat.products?.size() ?: 0}"></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                      method="post"
                                      onsubmit="return confirm('Delete this category?')">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
