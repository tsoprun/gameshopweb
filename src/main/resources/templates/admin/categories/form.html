<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Category')}"><title>Category Form — Admin</title></head>
<script>
    function autoCatSlug() {
        const slugField = document.getElementById('catSlug');
        if (slugField.dataset.manual === 'true') return;
        const name = document.getElementById('catName').value;
        slugField.value = name.toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9\s-]/g, '')
            .trim().replace(/\s+/g, '-');
    }
    document.getElementById('catSlug').addEventListener('input', function() {
        this.dataset.manual = 'true';
    });
</script>
<body>
<div class="d-flex" style="min-height:100vh;">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="fw-bold mb-0"
                th:text="${category.id != null} ? 'Edit category' : 'New category'"></h2>
        </div>

        <div class="card border-0 shadow-sm" style="max-width:480px;">
            <div class="card-body p-4">
                <form th:action="@{/admin/categories/save}" method="post"
                      th:object="${category}">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-3">
                        <label class="form-label fw-medium">Name</label>
                        <input type="text" class="form-control" id="catName" oninput="autoCatSlug()"
                               th:field="*{name}" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Slug</label>
                        <input type="text" class="form-control" id="catSlug"
                               th:field="*{slug}" required
                               placeholder="e.g. action-rpg"/>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-check-lg me-1"></i>Save
                        </button>
                        <a th:href="@{/admin/categories}"
                           class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
