<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login Logs')}"><title>Login Logs — Admin</title></head>
<body>
<div class="d-flex" style="min-height:100vh;">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>
    <main class="flex-grow-1 p-4">
        <h2 class="fw-bold mb-4">Login logs</h2>
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>User</th>
                        <th>IP Address</th>
                        <th>Logged in at</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs.content}">
                        <td th:text="${log.user.username}"></td>
                        <td><code th:text="${log.ipAddress}"></code></td>
                        <td th:text="${#temporals.format(log.loggedInAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <nav class="mt-3" th:if="${logs.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, logs.totalPages -1)}"
                    th:classappend="${i == logs.number} ? 'active'">
                    <a class="page-link" th:href="@{/admin/logs(page=${i})}"
                       th:text="${i+1}"></a>
                </li>
            </ul>
        </nav>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
