<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' | Level Up Shop'">Level Up Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true"/>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>

<body>

<nav th:fragment="navbar(cartCount)" class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/shop}">
            <i class="bi bi-controller me-2"></i>Level Up Shop
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <form class="d-flex mx-auto" th:action="@{/shop}" method="get">
                <input class="form-control me-2" type="search" name="search"
                       placeholder="Search games..." style="width:300px;"
                       th:value="${param.search}"/>
                <button class="btn btn-outline-light" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </form>
            <ul class="navbar-nav align-items-center gap-2">
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill"
                              style="background:var(--gold);color:var(--bg);">
                        </span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/auth/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-primary btn-sm" th:href="@{/auth/register}">Register</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" th:href="@{/orders}">
                                <i class="bi bi-bag me-2"></i>My Orders
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" th:href="@{/admin}">
                                <i class="bi bi-shield-check me-2"></i>Admin panel
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<nav th:fragment="admin-sidebar" class="admin-sidebar text-white p-3 d-flex flex-column">
    <div class="fw-bold mb-4">
        <i class="bi bi-shield-check me-2"></i>Admin
    </div>
    <ul class="nav flex-column gap-1 flex-grow-1">
        <li>
            <a th:href="@{/admin}" class="nav-link text-white">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
            <a th:href="@{/admin/products}" class="nav-link text-white">
                <i class="bi bi-controller me-2"></i>Products
            </a>
            <a th:href="@{/admin/categories}" class="nav-link text-white">
                <i class="bi bi-tags me-2"></i>Categories
            </a>
            <a th:href="@{/admin/orders}" class="nav-link text-white">
                <i class="bi bi-bag me-2"></i>Orders
            </a>
            <a th:href="@{/admin/logs}" class="nav-link text-white">
                <i class="bi bi-journal-text me-2"></i>Login logs
            </a>
        </li>
    </ul>
    <a th:href="@{/shop}" class="nav-link mt-auto" style="color:var(--text-dim);">
        <i class="bi bi-arrow-left me-1"></i>Back to shop
    </a>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
