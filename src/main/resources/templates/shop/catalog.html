<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Catalog')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(${cartCount})}"></nav>

<main class="container py-4">

    <form th:action="@{/shop}" method="get" class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <input type="hidden" name="search" th:value="${search}"/>
        <a th:href="@{/shop}"
           class="btn btn-sm"
           th:classappend="${selectedCategoryIds.isEmpty()} ? 'btn-dark' : 'btn-outline-secondary'">
            All
        </a>
        <th:block th:each="cat : ${categories}">
            <input type="checkbox" class="btn-check" th:id="'cat-' + ${cat.id}"
                   name="categoryIds" th:value="${cat.id}"
                   th:checked="${selectedCategoryIds.contains(cat.id)}"
                   onchange="this.form.submit()"/>
            <label class="btn btn-sm"
                   th:classappend="${selectedCategoryIds.contains(cat.id)} ? 'btn-dark' : 'btn-outline-secondary'"
                   th:for="'cat-' + ${cat.id}"
                   th:text="${cat.name}">
            </label>
        </th:block>
    </form>

    <p class="text-muted mb-3" th:text="${products.totalElements} + ' games found'"></p>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="product : ${products.content}">
            <div class="card h-100 product-card border-0 shadow-sm">
                <div class="position-relative overflow-hidden" style="height:180px;">
                    <img th:src="${product.imageUrl}" th:alt="${product.name}"
                         class="w-100 h-100 object-fit-cover"/>
                    <div class="product-overlay d-flex align-items-center
                                justify-content-center gap-2">
                        <a th:href="@{/shop/product/{s}(s=${product.slug})}"
                           class="btn btn-light btn-sm">
                            <i class="bi bi-eye"></i> Details
                        </a>
                    </div>
                </div>
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title mb-1 text-truncate" th:text="${product.name}"></h6>
                    <small class="text-muted mb-2" th:text="${product.genre}"></small>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-primary"
                              th:text="'$' + ${product.price}"></span>
                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                            <button class="btn btn-primary btn-sm" type="submit">
                                <i class="bi bi-cart-plus"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="mt-5" th:if="${products.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/shop(page=${products.number -1},search=${search},categoryIds=${selectedCategory})}">&laquo;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, products.totalPages -1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/shop(page=${i},search=${search},categoryIds=${selectedCategory})}"
                   th:text="${i+1}"></a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/shop(page=${products.number+1},search=${search},categoryIds=${selectedCategory})}">&raquo;</a>
            </li>
        </ul>
    </nav>

</main>

<footer class="bg-dark text-secondary text-center py-3 mt-5">
    <small>GameShop &copy; 2025</small>
</footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
