<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"><title>Dashboard — Admin</title></head>
<body>

<div class="d-flex" style="min-height:100vh;">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>
    <form th:action="@{/admin/sync-games}" method="post" class="mt-4">
        <button class="btn btn-warning" type="submit">
            <i class="bi bi-cloud-download me-2"></i>Sync games from RAWG
        </button>
    </form>
    <main class="flex-grow-1 p-4">
        <h2 class="fw-bold mb-4">Dashboard</h2>
        <div class="row g-3">
            <div class="col-sm-4">
                <div class="card border-0 shadow-sm text-center p-3">
                    <div class="fs-1 fw-bold text-primary" th:text="${userCount}"></div>
                    <div class="text-muted">Registered users</div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="card border-0 shadow-sm text-center p-3">
                    <div class="fs-1 fw-bold text-success" th:text="${categories.size()}"></div>
                    <div class="text-muted">Categories</div>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
