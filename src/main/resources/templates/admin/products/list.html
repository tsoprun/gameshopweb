<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"><title>Products — Admin</title></head>
<body>
<div class="d-flex" style="min-height:100vh;">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Products</h2>
            <a th:href="@{/admin/products/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Add product
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Cover</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Metacritic</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${products.content}">
                        <td class="text-muted small" th:text="${p.id}"></td>
                        <td>
                            <img th:src="${p.imageUrl}" class="rounded"
                                 style="width:52px;height:36px;object-fit:cover;"
                                 th:if="${p.imageUrl != null}"/>
                        </td>
                        <td class="fw-medium" th:text="${p.name}"></td>
                        <td>
                                <span th:each="cat : ${p.categories}"
                                      class="badge bg-secondary me-1"
                                      th:text="${cat.name}"></span>
                        </td>
                        <td th:text="'$' + ${p.price}"></td>
                        <td>
                                <span th:if="${p.metacriticScore != null}"
                                      th:text="${p.metacriticScore}"
                                      class="badge"
                                      th:classappend="${p.metacriticScore >= 75}
                                                      ? 'bg-success' : 'bg-warning text-dark'">
                                </span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/products/delete/{id}(id=${p.id})}"
                                      method="post"
                                      onsubmit="return confirm('Delete this product?')">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav class="mt-3" th:if="${products.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, products.totalPages-1)}"
                    th:classappend="${i == products.number} ? 'active'">
                    <a class="page-link" th:href="@{/admin/products(page=${i})}"
                       th:text="${i+1}"></a>
                </li>
            </ul>
        </nav>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
