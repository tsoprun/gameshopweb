<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Orders')}"><title>Orders — Admin</title></head>
<body>
<div class="d-flex" style="min-height:100vh;">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <h2 class="fw-bold mb-4">Orders</h2>

        <!-- Filters -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/admin/orders}" method="get"
                      class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label fw-medium small">User</label>
                        <select class="form-select form-select-sm" name="userId">
                            <option value="">All users</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.username}"
                                    th:selected="${u.id == selectedUserId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium small">From</label>
                        <input type="datetime-local" class="form-control form-control-sm"
                               name="from"
                               th:value="${from != null}
                                          ? ${#temporals.format(from,'yyyy-MM-dd''T''HH:mm')}
                                          : ''"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium small">To</label>
                        <input type="datetime-local" class="form-control form-control-sm"
                               name="to"
                               th:value="${to != null}
                                          ? ${#temporals.format(to,'yyyy-MM-dd''T''HH:mm')}
                                          : ''"/>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button class="btn btn-primary btn-sm" type="submit">
                            <i class="bi bi-funnel me-1"></i>Filter
                        </button>
                        <a th:href="@{/admin/orders}"
                           class="btn btn-outline-secondary btn-sm">Reset</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Payment</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${orders.empty}">
                        <td colspan="7" class="text-center text-muted py-4">
                            No orders found.
                        </td>
                    </tr>
                    <tr th:each="o : ${orders.content}">
                        <td class="text-muted small" th:text="${o.id}"></td>
                        <td class="fw-medium" th:text="${o.user.username}"></td>
                        <td th:text="${#temporals.format(o.createdAt,
                                           'dd.MM.yyyy HH:mm')}"></td>
                        <td th:text="${o.items.size()}"></td>
                        <td class="fw-bold" th:text="'$' + ${o.totalAmount}"></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${o.paymentMethod.name() == 'PAYPAL'}
                                                      ? 'bg-warning text-dark' : 'bg-secondary'"
                                      th:text="${o.paymentMethod}"></span>
                        </td>
                        <td>
                                <span class="badge"
                                      th:classappend="${o.status.name() == 'COMPLETED'}
                                                      ? 'bg-success' : 'bg-warning text-dark'"
                                      th:text="${o.status}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav class="mt-3" th:if="${orders.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, orders.totalPages-1)}"
                    th:classappend="${i == orders.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/orders(page=${i},userId=${selectedUserId})}"
                       th:text="${i+1}"></a>
                </li>
            </ul>
        </nav>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
